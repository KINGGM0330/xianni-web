.nav-links a .ic{font-size:13px;opacity:.85}

.burger{display:none;margin-left:auto;background:var(--panel);border:1px solid var(--line2);color:var(--gold2);width:42px;height:38px;border-radius:9px;font-size:19px;cursor:pointer}
.main{position:relative;z-index:1}
.content{max-width:1240px;margin:0 auto;padding:26px 26px 70px}
.section{display:none}
h1.title{font-size:23px;font-weight:900;letter-spacing:1px;margin-bottom:4px;background:linear-gradient(135deg,var(--gold2),var(--gdim));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}

(function(){const c=el('fx'),x=c.getContext('2d');let w,h,ps;
 function rs(){w=c.width=innerWidth;h=c.height=innerHeight;}rs();addEventListener('resize',rs);
 ps=Array.from({length:70},()=>({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.8+.4,s:Math.random()*.4+.08,o:Math.random()*.5+.2,h:Math.random()<.5?'231,196,106':'165,130,255'}));
 (function loop(){x.clearRect(0,0,w,h);for(const p of ps){p.y-=p.s;p.x+=Math.sin(p.y*.01)*.15;if(p.y<-5){p.y=h+5;p.x=Math.random()*w;}x.beginPath();x.arc(p.x,p.y,p.r,0,7);x.fillStyle='rgba('+p.h+','+p.o+')';x.shadowBlur=8;x.shadowColor='rgba('+p.h+',.8)';x.fill();}requestAnimationFrame(loop);})();})();

function chips(s){const keys=Object.keys(s||{});if(!keys.length)return '<span style="color:var(--mut);font-size:11px">—</span>';
 return '<div class="chips">'+keys.map(k=>{const v=s[k];const cls=(typeof v==='number'&&v<0)?'neg':'pos';return '<span class="chip '+cls+'">'+esc(k)+'<b>'+(v>0?'+':'')+v+'</b></span>';}).join('')+'</div>';}
function jobs(arr){if(!arr||!arr.length)return '<span style="color:var(--mut);font-size:11px">全職</span>';if(arr.length>=8)return '<span class="job">全職業</span>';return '<div class="jobs">'+arr.map(j=>'<span class="job">'+esc(j)+'</span>').join('')+'</div>';}

let heroRAF=null;
function initHeroFx(){if(heroRAF)cancelAnimationFrame(heroRAF);const c=document.querySelector('.hero-fx');if(!c)return;const x=c.getContext('2d');let w=0,h=0;
 function rs(){const r=c.getBoundingClientRect();w=c.width=Math.max(1,r.width|0);h=c.height=Math.max(1,r.height|0);}rs();
 const COL=['231,196,106','150,200,255','185,150,255','120,240,220'];
 const motes=Array.from({length:48},()=>({x:Math.random()*w,y:Math.random()*h,r:Math.random()*2+.6,s:Math.random()*.5+.15,dr:Math.random()*.6-.3,ph:Math.random()*6.28,tw:Math.random()*.045+.012,c:COL[(Math.random()*COL.length)|0],o:Math.random()*.5+.3}));
 const pet=Array.from({length:16},()=>({x:Math.random()*w,y:Math.random()*h,vy:Math.random()*.5+.22,vx:Math.random()*.5-.25,rot:Math.random()*6.28,vr:(Math.random()*.02-.01),sz:Math.random()*7+5,o:Math.random()*.4+.22}));
 let t=0;function loop(){t++;x.clearRect(0,0,w,h);
  for(const m of motes){m.y-=m.s;m.x+=Math.sin(t*.01+m.ph)*.3+m.dr;if(m.y<-6){m.y=h+6;m.x=Math.random()*w;}if(m.x<-10)m.x=w+10;if(m.x>w+10)m.x=-10;const a=m.o*(0.55+0.45*Math.sin(t*m.tw+m.ph));x.beginPath();x.arc(m.x,m.y,m.r,0,6.29);x.fillStyle='rgba('+m.c+','+a.toFixed(3)+')';x.shadowBlur=10;x.shadowColor='rgba('+m.c+',.9)';x.fill();}
  x.shadowBlur=0;for(const p of pet){p.y+=p.vy;p.x+=p.vx+Math.sin(p.y*.02)*.3;p.rot+=p.vr;if(p.y>h+12){p.y=-12;p.x=Math.random()*w;}x.save();x.translate(p.x,p.y);x.rotate(p.rot);x.fillStyle='rgba(255,190,225,'+p.o+')';x.beginPath();x.ellipse(0,0,p.sz,p.sz*.48,0,0,6.29);x.fill();x.restore();}
  heroRAF=requestAnimationFrame(loop);}loop();}

 <div class="blocktitle">強化 / 外觀</div><div class="grid">${gc('star','','星盤守護星',DB.star.length+' 項')}${gc('bless','','祝福強化',DB.bless.length+' 項')}${gc('refine','','裝備洗練',DB.refine.length+' 項')}${gc('color','','炫色系統',DB.color.length+' 項')}</div>
 <div class="blocktitle">收集 / 商店</div><div class="grid">${gc('bosscol','','BOSS收集',DB.bosscol.length+' 項')}${gc('achieve','','成就圖鑑',DB.achieve.length+' 項')}${gc('preshop','','威望商店',DB.preshop.length+' 項')}</div>`;}

let cur='home';
const R={home,settings,weapon:()=>equipView('weapon'),armor:()=>equipView('armor'),cards,
 doll:()=>cardView('doll','娃娃系統','召喚娃娃並蒐集卡片累積能力'),transform:()=>cardView('transform','變身系統','變身取得外觀與能力，含時效'),holy:()=>cardView('holy','聖物系統','聖物提供防禦與特殊素質'),
 pattern:patternView,rebirth:rebirthView,prestige:prestigeView,more,rebskill:rebskillView,preshop:preshopView,clan:clanView,
 star:()=>listView('star'),bless:()=>listView('bless'),refine:()=>listView('refine'),color:()=>listView('color'),bosscol:()=>listView('bosscol'),achieve:()=>listView('achieve')};
window.__f=function(){if(cur==='weapon')equipRender('weapon');else if(cur==='armor')equipRender('armor');else if(cur==='doll')cardRender('doll');else if(cur==='transform')cardRender('transform');else if(cur==='holy')cardRender('holy');else if(cur==='pattern')patternRender();else if(LISTKEYS.indexOf(cur)>=0)listRender(cur);};
function go(s){if(!R[s])s='home';cur=s;app.innerHTML=R[s]();document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('on',a.dataset.s===s));
 if(s==='weapon')equipRender('weapon');if(s==='armor')equipRender('armor');if(s==='doll')cardRender('doll');if(s==='transform')cardRender('transform');if(s==='holy')cardRender('holy');if(s==='pattern')patternRender();if(LISTKEYS.indexOf(s)>=0)listRender(s);
 if(s==='home')initHeroFx();window.scrollTo(0,0);if(window.innerWidth<=900)closeNav();history.replaceState(null,'','#'+s);}
window.__go=go;
window.__art=function(kind,i){cur='article';let html='';
 if(kind==='news'){const n=(window.SITE_NEWS||NEWS_DEFAULT)[i]||['','','',''];html=`<div class="backbtn" onclick="__go('home')">← 返回首頁</div><div class="art"><div class="art-head"><div class="ann-badge2">${esc(n[1]||'')}</div><h1 class="title">${esc(n[2]||'')}</h1><div class="subtitle">${esc(n[0]||'')}</div></div><div class="art-body">${n[3]||'<p>（此公告尚未填寫內文，可在 assets/news.js 為該則加上第 4 欄內文）</p>'}</div></div>`;}
 else if(kind==='setting'){html=`<div class="backbtn" onclick="__go('settings')">← 返回遊戲設定</div>`+renderSetting(SETTINGS[i]);}
 app.innerHTML=html;document.querySelectorAll('#nav a').forEach(a=>a.classList.remove('on'));window.scrollTo(0,0);if(window.innerWidth<=900)closeNav();};
document.getElementById('nav').addEventListener('click',e=>{const a=e.target.closest('a[data-s]');if(a)go(a.dataset.s);});
document.querySelector('.nav-brand').addEventListener('click',()=>go('home'));
app.addEventListener('click',e=>{const c=e.target.closest('[data-go]');if(c)go(c.dataset.go);});
window.toggleNav=function(){el('nav').classList.toggle('open');};
function closeNav(){el('nav').classList.remove('open');}
go((location.hash||'#home').slice(1));
})();
</script></body></html>
